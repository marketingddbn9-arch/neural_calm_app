name: neural_calm
description: "Neural Calm - Your Personal Wellness Companion"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.3
  firebase_core: ^2.24.0
  firebase_auth: ^4.15.0
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.6.0
  firebase_messaging: ^14.7.0
  dio: ^5.3.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2
  flutter_svg: ^2.0.9
  lottie: ^2.6.0
  fl_chart: ^0.63.0
  google_fonts: ^6.1.0
  intl: ^0.19.0
  uuid: ^4.0.0
  collection: ^1.17.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.6
  riverpod_generator: ^2.3.6

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
    - assets/images/splash.png