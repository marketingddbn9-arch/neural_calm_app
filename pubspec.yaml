name: neural_calm
description: "Neural Calm - Your Personal Wellness Companion"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.3

  # Firebase
  firebase_core: ^2.24.0
  firebase_auth: ^4.15.0
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.6.0
  firebase_messaging: ^14.7.0

  # HTTP & Networking
  dio: ^5.3.1

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2

  # UI & Animations
  flutter_svg: ^2.0.9
  lottie: ^2.6.0
  fl_chart: ^0.63.0
  google_fonts: ^6.1.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.0.0
  collection: ^1.17.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.6
  riverpod_generator: ^2.3.6

flutter:
  uses-material-design: true

  assets:
    # Icons
    - assets/icons/home.svg
    - assets/icons/checkin.svg
    - assets/icons/trends.svg
    - assets/icons/coach.svg
    - assets/icons/profile.svg

    # Images
    - assets/images/logo.png
    - assets/images/splash.png
    - assets/images/app_icon.png
    - assets/images/app_icon_foreground.png
    - assets/images/onboarding/

    # Animations
    - assets/animations/loading.json
    - assets/animations/success.json

  fonts:
    - family: InterTight
      fonts:
        - asset: assets/fonts/InterTight-Regular.ttf
          weight: 400
        - asset: assets/fonts/InterTight-Medium.ttf
          weight: 500
        - asset: assets/fonts/InterTight-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/InterTight-Bold.ttf
          weight: 700
        - asset: assets/fonts/InterTight-ExtraBold.ttf
          weight: 800
